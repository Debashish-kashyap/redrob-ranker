# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
 
ai_usage_summary: |
  Used Claude (claude.ai) for architectural discussion, code review, and
  debugging. Claude helped design the multi-component scoring architecture
  and suggested the sentence-BERT hybrid approach. All engineering decisions,
  testing, validation, and final tuning were done by the team. No candidate
  data was fed to any external LLM during ranking — the system runs fully
  offline with no API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-layer hybrid ranking system combining rule-based scoring,
  TF-IDF semantic similarity, and sentence-BERT embeddings.
 
  Layer 1 — Sentence-BERT Semantic Scoring (30% weight):
  all-MiniLM-L6-v2 model encodes each candidate's headline, summary,
  current role, and top skills into a 384-dim vector. Four JD aspect
  queries (core technical, evaluation/ML, production engineering, full JD)
  are encoded and weighted cosine similarity is computed. Embeddings are
  precomputed offline and loaded at ranking time (~154MB). This catches
  plain-language Tier 5 candidates who describe real retrieval/ranking
  systems without using buzzwords.
 
  Layer 2 — Rule-based Scoring (70% weight across 4 components):
  Title and career track (32%): hard-disqualifies off-domain titles,
  penalizes IT services-only careers, rewards product company experience.
  Skills (28%): matches 30+ JD-relevant keywords weighted by proficiency
  x duration x endorsements — catches keyword stuffers with zero-duration
  expert claims. Experience (22%): ideal 5-9yr range with production ML
  signal detection in career descriptions. Location (18%): Pune/Noida
  preferred, acceptable India cities scored, relocation willingness used.
 
  Layer 3 — Behavioral Multiplier (applied after layers 1+2):
  All 23 redrob_signals used: last_active_date recency, open_to_work_flag,
  recruiter_response_rate, notice_period_days, interview_completion_rate,
  github_activity_score, verification signals, work mode preference.
 
  Honeypot detection: 6 consistency checks (expert skill with 0 duration,
  impossible career timeline, 10+ expert skills, implausible role duration,
  YoE vs oldest career entry, high endorsements with 0 duration). Requires
  2+ flags to disqualify. Detected 1 honeypot in 100K pool, 0 in top 100.
 
  Runtime: 24.7 seconds for 100K candidates (embeddings preloaded).
  Precomputation: ~14 minutes once offline, saved to embeddings.npy

